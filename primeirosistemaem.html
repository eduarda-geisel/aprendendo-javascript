<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Catálogo de Produtos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        h1 {
            color: #960e0e;
        }

        .formulario {
            background: #fff;
            padding: 15px 30px 15px 15px;
            border-radius: 8px;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .formulario input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        .formulario button {
            background: #960e0e;
            color: #fff;
            padding: 10px 20px ;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        .formulario button:hover {
            background: #7a0a0a;
        }

        #catalogo {
            display: grid;
            gap: 15px;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        }

        .produto {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .produto h2 {
            margin: 0 0 10px 0;
            color: #960e0e;
            font-size: 1.2rem;
            text-transform: capitalize;
        }

        .produto p {
            margin: 5px 0;
            color: #333;
        }

        .produto button {
            background: #d32f2f;
            color: #fff;
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        .produto button:hover {
            background: #b71c1c;
        }
    </style>
</head>
<body>
    <h1>Catálogo de Produtos</h1>

    <div class="formulario">
        <input type="text" id="nome" placeholder="Nome do produto" />
        <input type="number" id="preco" placeholder="Preço" />
        <input type="number" id="estoque" placeholder="Estoque" />
        <button onclick="adicionarProduto()">Adicionar</button>
        <button onclick="atualizar()">Atualizar</button>
        <button onclick="limparFormulario()">Limpar</button>
    </div>

    <div id="catalogo"></div>

    <script src="primeirosistema.js"></script>
</body>
</html>
